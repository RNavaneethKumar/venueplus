<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  @page {
    size: 80mm auto;
    margin: 0;
  }

  body {
    font-family: 'Courier New', Courier, monospace;
    font-size: 11px;
    line-height: 1.4;
    color: #000;
    background: #fff;
    width: 72mm;
    padding: 4mm 4mm 8mm 4mm;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 6px;
    padding-bottom: 6px;
    border-bottom: 1px dashed #000;
  }
  .venue-name {
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .receipt-meta {
    font-size: 10px;
    color: #333;
    line-height: 1.6;
  }

  /* ── Divider ── */
  .divider {
    border: none;
    border-top: 1px dashed #000;
    margin: 5px 0;
  }

  /* ── Items ── */
  .items-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 4px;
  }
  .items-table th {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border-bottom: 1px solid #000;
    padding: 2px 0;
    text-align: left;
  }
  .items-table th:last-child,
  .items-table td:last-child {
    text-align: right;
  }
  .items-table th.item-qty,
  .items-table td.item-qty {
    text-align: center;
    width: 20px;
  }
  .items-table th.item-price,
  .items-table td.item-price {
    text-align: right;
    width: 42px;
  }
  .items-table th.item-total,
  .items-table td.item-total {
    text-align: right;
    width: 42px;
  }
  .items-table td {
    padding: 2px 0;
    vertical-align: top;
  }
  .item-name {
    max-width: 90px;
  }
  .visitor-type {
    display: block;
    font-size: 9px;
    color: #555;
  }
  .strike {
    text-decoration: line-through;
    color: #777;
    font-size: 9px;
  }
  td.item-total.strike {
    text-decoration: none;
    color: #000;
  }

  /* ── Totals ── */
  .totals-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 4px;
  }
  .totals-table td {
    padding: 1px 0;
  }
  .totals-table td:last-child {
    text-align: right;
  }
  .totals-table tr.total-row td {
    font-size: 14px;
    font-weight: bold;
    padding-top: 4px;
    border-top: 1px solid #000;
  }
  .totals-table tr.tax-row td {
    font-size: 9px;
    color: #555;
  }

  /* ── Payment ── */
  .payment-section {
    margin-top: 6px;
  }
  .payment-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    margin-bottom: 2px;
    color: #555;
  }
  .payment-table {
    width: 100%;
    border-collapse: collapse;
  }
  .payment-table td {
    padding: 1px 0;
    font-size: 11px;
  }
  .pay-method {
    text-align: left;
  }
  .pay-amount {
    text-align: right;
    font-weight: bold;
  }

  /* ── Notes ── */
  .notes {
    font-size: 9px;
    color: #555;
    margin-top: 4px;
    font-style: italic;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 8px;
    padding-top: 6px;
    border-top: 1px dashed #000;
    font-size: 8px;
    color: #aaa;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="venue-name">{{VENUE_NAME}}</div>
  <div class="receipt-meta">
    Order: <strong>{{ORDER_NUMBER}}</strong><br>
    {{DATE}}  {{TIME}}<br>
    Cashier: {{CASHIER}}
  </div>
</div>

<!-- Items -->
<table class="items-table">
  <thead>
    <tr>
      <th class="item-name">Item</th>
      <th class="item-qty">Qty</th>
      <th class="item-price">Price</th>
      <th class="item-total">Total</th>
    </tr>
  </thead>
  <tbody>
    {{ITEM_ROWS}}
  </tbody>
</table>

<hr class="divider">

<!-- Totals -->
<table class="totals-table">
  <tr>
    <td>Subtotal</td>
    <td>{{SUBTOTAL}}</td>
  </tr>
  {{DISCOUNT_ROW}}
  <tr class="tax-row">
    <td>GST (18%)</td>
    <td>{{TAX}}</td>
  </tr>
  <tr class="total-row">
    <td>TOTAL</td>
    <td>{{TOTAL}}</td>
  </tr>
</table>

<!-- Payment -->
<div class="payment-section">
  <div class="payment-label">Payment</div>
  <table class="payment-table">
    {{PAYMENT_ROWS}}
  </table>
</div>

{{NOTES_ROW}}

<!-- Footer -->
<div class="footer">Powered by VenuePlus</div>

</body>
</html>
