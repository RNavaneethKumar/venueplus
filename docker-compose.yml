# =============================================================================
# VenuePlus — Docker Compose (Distribution)
#
# Prerequisites:
#   - Docker Desktop installed (https://www.docker.com/products/docker-desktop)
#
# Usage:
#   docker compose up -d
#   Open: http://localhost:3001
#
# To stop:   docker compose down
# To update: docker compose pull && docker compose up -d
#
# For developers building from source, use:
#   docker compose -f docker-compose.build.yml --env-file .env.docker.local up --build
# =============================================================================

services:

  api:
    image: rnavaneethkumar/venueplus-api:latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://neondb_owner:npg_SUeWvdo30MBf@ep-winter-hall-a130kqon-pooler.ap-southeast-1.aws.neon.tech/venueplus_demo?sslmode=require
      REGISTRY_DATABASE_URL: postgresql://neondb_owner:npg_SUeWvdo30MBf@ep-winter-hall-a130kqon-pooler.ap-southeast-1.aws.neon.tech/venueplus_registry?sslmode=require
      POSTGRES_ADMIN_URL: postgresql://neondb_owner:npg_SUeWvdo30MBf@ep-winter-hall-a130kqon-pooler.ap-southeast-1.aws.neon.tech/postgres?sslmode=require
      DATABASE_SCRIPTS_PATH: /app/database
      JWT_SECRET: 6fafbb696d3704d687a61a3bbc63a05dff465269bb10d859ebab7443581a12cb
      JWT_EXPIRES_IN: 7d
      GLOBAL_ADMIN_SEED_SECRET: 1134434c30466bea41074b409ed1d0a9
      CORS_ORIGINS: http://localhost:3001,http://venueplus.local:3001
      # Allows *.localhost for local Docker testing (e.g. demo.localhost:3001).
      # When deploying to production change this to your real base domain:
      #   CORS_BASE_DOMAIN: venueplus.in
      CORS_BASE_DOMAIN: venueplus.local
      SMS_PROVIDER: console
      EMAIL_PROVIDER: console
      FROM_EMAIL: noreply@venueplus.io
    healthcheck:
      # Uses Node's built-in http module — no wget/curl dependency required.
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 15s
      timeout: 10s
      retries: 6
      # Give the API plenty of time on cold start (Neon SSL handshake can be slow).
      start_period: 60s

  pos:
    image: rnavaneethkumar/venueplus-pos:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      # Runtime tenant slug — tells the POS which tenant to connect to when
      # running on plain localhost (no subdomain). Change this to match your
      # tenant slug without rebuilding the image.
      TENANT_SLUG: demo
      # Optional: pre-configure the device license key for this terminal.
      # When set, any browser that opens the POS is auto-activated silently —
      # no manual key entry needed. Generate a key in Back Office → Devices.
      # DEVICE_LICENSE_KEY: VP-XXXX-XXXX-XXXX
    # The POS is a browser app — it calls the API client-side, not at container
    # startup. Using service_started means the POS comes up immediately without
    # waiting for the API health check to pass.
    depends_on:
      api:
        condition: service_started
