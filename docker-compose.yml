# =============================================================================
# VenuePlus — Docker Compose
#
# Runs the API (Fastify) and POS (Next.js) containers.
# The database is intentionally excluded — point DATABASE_URL and
# REGISTRY_DATABASE_URL at an external Postgres instance (e.g. Neon, Render,
# or a local Postgres running outside Docker).
#
# Quick start:
#   1. Copy .env.docker to .env.docker.local and fill in your values
#   2. docker compose --env-file .env.docker.local up --build
#
# For production images (no rebuild):
#   docker compose --env-file .env.docker.local up -d
# =============================================================================

services:

  # ── API (Fastify) ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: venueplus-api:latest
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: ${LOG_LEVEL:-info}

      # ── Database ─────────────────────────────────────────────────────────
      # Main application database (single-tenant) or registry database connection
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}

      # Multi-tenant registry — maps tenant slugs to per-tenant DB URLs.
      # Leave unset to run in single-tenant mode.
      REGISTRY_DATABASE_URL: ${REGISTRY_DATABASE_URL:-}

      # Superuser URL for CREATE DATABASE during tenant provisioning.
      # Required only if you use the "Provision new database" feature in the
      # global admin UI. Must have CREATEDB privilege.
      POSTGRES_ADMIN_URL: ${POSTGRES_ADMIN_URL:-}

      # Path to the database/ folder inside the container (do not change).
      DATABASE_SCRIPTS_PATH: /app/database

      # ── Auth ─────────────────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # ── Global Admin ─────────────────────────────────────────────────────
      # One-time secret to seed the first global admin account.
      # Remove after seeding.
      GLOBAL_ADMIN_SEED_SECRET: ${GLOBAL_ADMIN_SEED_SECRET:-}

      # ── CORS ─────────────────────────────────────────────────────────────
      # Comma-separated list of allowed frontend origins.
      # Example: https://pos.venueplus.io,https://kiosk.venueplus.io
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}

      # ── Notifications ────────────────────────────────────────────────────
      SMS_PROVIDER: ${SMS_PROVIDER:-console}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@venueplus.io}

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s


  # ── POS (Next.js) ───────────────────────────────────────────────────────────
  pos:
    build:
      context: .
      dockerfile: apps/pos/Dockerfile
      args:
        # NEXT_PUBLIC_* vars are baked into the JS bundle at build time.
        # Changing these requires a rebuild (docker compose build pos).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api/v1}
        NEXT_PUBLIC_VENUE_ID: ${NEXT_PUBLIC_VENUE_ID:-}
        NEXT_PUBLIC_TENANT_SLUG: ${NEXT_PUBLIC_TENANT_SLUG:-}
    image: venueplus-pos:latest
    restart: unless-stopped
    ports:
      - "${POS_PORT:-3001}:3001"
    depends_on:
      api:
        condition: service_healthy
