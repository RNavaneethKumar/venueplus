# =============================================================================
# VenuePlus — Distribution Compose File
#
# Prerequisites:
#   - Docker Desktop installed (https://www.docker.com/products/docker-desktop)
#
# Usage:
#   docker compose -f docker-compose.dist.yml up -d
#   Open: http://localhost:3001
#
# To stop:   docker compose -f docker-compose.dist.yml down
# To update: docker compose -f docker-compose.dist.yml pull
#            docker compose -f docker-compose.dist.yml up -d
# =============================================================================

services:

  api:
    image: yourusername/venueplus-api:latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://neondb_owner:npg_SUeWvdo30MBf@ep-winter-hall-a130kqon-pooler.ap-southeast-1.aws.neon.tech/venueplus_demo?sslmode=require
      REGISTRY_DATABASE_URL: postgresql://neondb_owner:npg_SUeWvdo30MBf@ep-winter-hall-a130kqon-pooler.ap-southeast-1.aws.neon.tech/venueplus_registry?sslmode=require
      POSTGRES_ADMIN_URL: postgresql://neondb_owner:npg_SUeWvdo30MBf@ep-winter-hall-a130kqon-pooler.ap-southeast-1.aws.neon.tech/postgres?sslmode=require
      DATABASE_SCRIPTS_PATH: /app/database
      JWT_SECRET: 6fafbb696d3704d687a61a3bbc63a05dff465269bb10d859ebab7443581a12cb
      JWT_EXPIRES_IN: 7d
      GLOBAL_ADMIN_SEED_SECRET: 1134434c30466bea41074b409ed1d0a9
      CORS_ORIGINS: http://localhost:3001
      SMS_PROVIDER: console
      EMAIL_PROVIDER: console
      FROM_EMAIL: noreply@venueplus.io
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  pos:
    image: yourusername/venueplus-pos:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      api:
        condition: service_healthy
